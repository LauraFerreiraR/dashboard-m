<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOOUI · Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script>
  Chart.register(ChartDataLabels);
  Chart.defaults.plugins.datalabels.display = false;
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap');

  :root{
    --ink:#2A2622; --ink-soft:#6B645C; --ink-faint:#9A938A;
    --paper:#FBF9F4; --card:#FFFFFF; --line:#E8E3DA; --line-soft:#F0ECE4;
    --coral:#E07856; --coral-dark:#C25A3C;
    --sage:#5DCAA5; --grape:#7F77DD; --amber:#D4982F; --rose:#D4537E; --sky:#378ADD; --moss:#1D9E75; --gold:#BA7517;
    --green-bg:#E8F3DD; --green-tx:#3B6D11;
    --amber-bg:#FBEFD6; --amber-tx:#8B5A00;
    --red-bg:#FBE0E0; --red-tx:#A52A2A;
    --shadow:0 1px 2px rgba(42,38,34,.04),0 4px 16px rgba(42,38,34,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 12% 8%,rgba(224,120,86,.05),transparent 40%),radial-gradient(circle at 88% 92%,rgba(93,202,165,.05),transparent 40%);
    background-attachment:fixed}
  .wrap{max-width:1180px;margin:0 auto;padding:32px 24px 80px}

  /* HERO */
  .hero{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:24px}
  .hero-left .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--coral);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .hero-left .live-dot{width:8px;height:8px;border-radius:50%;background:var(--moss);box-shadow:0 0 0 0 rgba(29,158,117,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.6)}70%{box-shadow:0 0 0 10px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}
  .hero-logo{height:clamp(36px,5vw,52px);width:auto;display:block;object-fit:contain}
  .hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .updated{font-size:12px;color:var(--ink-soft)}
  .refresh-btn{background:var(--ink);color:#fff;border:none;padding:11px 20px;border-radius:30px;font-size:14px;font-weight:500;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:8px;transition:all .2s;box-shadow:var(--shadow)}
  .refresh-btn:hover{background:var(--coral);transform:translateY(-1px)}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}
  .refresh-btn svg{width:16px;height:16px}
  .refresh-btn.loading svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* TABS */
  .tabs{display:flex;gap:6px;margin:24px 0 24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:11px 18px;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;border:none;background:none;
    border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .18s;border-radius:8px 8px 0 0;font-family:inherit}
  .tab:hover{color:var(--ink);background:var(--line-soft)}
  .tab.active{color:var(--coral);border-bottom-color:var(--coral);font-weight:600}

  .panel{display:none;animation:fade .35s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* KPIs grandes */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--coral)}
  .kpi.sage::before{background:var(--sage)}
  .kpi.grape::before{background:var(--grape)}
  .kpi.amber::before{background:var(--amber)}
  .kpi.rose::before{background:var(--rose)}
  .kpi .label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:10px}
  .kpi .value{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1;letter-spacing:-.02em}
  .kpi .sub{font-size:12px;color:var(--ink-soft);margin-top:8px;display:flex;align-items:center;gap:5px}
  .delta{font-size:12px;font-weight:600;padding:2px 7px;border-radius:12px}
  .delta-up{background:var(--green-bg);color:var(--green-tx)}
  .delta-down{background:var(--red-bg);color:var(--red-tx)}
  .delta-flat{background:var(--line-soft);color:var(--ink-soft)}

  .section-label{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .section-desc{font-size:13.5px;color:var(--ink-soft);margin-bottom:20px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px}

  /* Tabela de comparativo */
  .compare-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
  .cmp{padding:20px 24px;border-right:1px solid var(--line);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .cmp:last-child{border-right:none}
  .cmp .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:8px}
  .cmp .val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.01em}
  .cmp .ctx{font-size:12px;color:var(--ink-soft);margin-top:4px}

  /* Top lists */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0 8px}
  @media(max-width:760px){.two-col{grid-template-columns:1fr}}
  .top-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}
  .top-card h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px}
  .top-card .h-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px}
  .top-list{display:flex;flex-direction:column;gap:2px}
  .top-row{display:grid;grid-template-columns:24px 1fr auto;gap:12px;align-items:center;padding:10px 4px;border-bottom:1px solid var(--line-soft)}
  .top-row:last-child{border-bottom:none}
  .top-rank{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--ink-faint);text-align:center}
  .top-rank.gold{color:#B8860B}
  .top-name{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .top-meta{font-size:11.5px;color:var(--ink-soft);font-weight:400;margin-top:2px}
  .top-value{font-family:'Fraunces',serif;font-size:15px;font-weight:600;text-align:right;white-space:nowrap}
  .top-empty{text-align:center;padding:30px 16px;color:var(--ink-faint);font-size:13.5px}

  /* Tabela */
  table{width:100%;border-collapse:collapse}
  thead th{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;
    text-align:right;padding:10px 12px;border-bottom:1.5px solid var(--line);background:var(--paper);position:sticky;top:0}
  thead th:first-child{text-align:left}
  tbody td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--line-soft);text-align:right;vertical-align:middle}
  tbody td:first-child{text-align:left;font-weight:500;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tbody tr:hover{background:var(--paper)}

  /* Tag de tipo de página (NOVO) */
  .type-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;margin-right:8px;
    letter-spacing:.04em;text-transform:uppercase;vertical-align:middle}
  .type-col{background:#EEEDFE;color:#534AB7}
  .type-prod{background:#E1F5EE;color:#1D7A56}
  .type-other{background:var(--line-soft);color:var(--ink-soft)}

  .minibar{display:inline-block;height:7px;border-radius:5px;background:var(--sage)}
  .minibar-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .pill-g{background:var(--green-bg);color:var(--green-tx)}
  .pill-a{background:var(--amber-bg);color:var(--amber-tx)}
  .pill-r{background:var(--red-bg);color:var(--red-tx)}
  .pill-n{background:var(--line-soft);color:var(--ink-soft)}

  /* Date picker bar */
  .date-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
  .date-bar .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .date-bar input[type="date"]{padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;
    font-family:inherit;background:var(--paper);color:var(--ink);outline:none;cursor:pointer;transition:border .15s}
  .date-bar input[type="date"]:focus{border-color:var(--coral)}
  .date-bar .arrow{color:var(--ink-faint);font-size:14px}
  .date-bar .apply{background:var(--coral);color:#fff;border:none;padding:9px 18px;border-radius:10px;
    font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
  .date-bar .apply:hover{background:var(--coral-dark)}
  .date-bar .preset{background:none;border:1px solid var(--line);color:var(--ink-soft);padding:7px 12px;
    border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
  .date-bar .preset:hover{border-color:var(--coral);color:var(--ink)}
  .date-bar .info{margin-left:auto;font-size:12px;color:var(--ink-soft)}

  /* Filter chips de tipo (NOVO) */
  .type-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .type-filter .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-right:4px}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--ink-soft);padding:8px 14px;
    border-radius:30px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;
    display:flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--coral);color:var(--ink)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .badge{font-size:10px;font-weight:600;background:rgba(0,0,0,.08);padding:1px 7px;border-radius:10px;
    color:inherit;line-height:1.4}
  .chip.on .badge{background:rgba(255,255,255,.18)}

  .search{display:flex;gap:10px;margin-bottom:14px;align-items:center}
  .search input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:30px;font-size:13.5px;font-family:inherit;background:var(--card);outline:none;transition:border .15s}
  .search input:focus{border-color:var(--coral)}
  .search .count{font-size:12px;color:var(--ink-faint)}

  /* Loading / Error states */
  .state{padding:60px 30px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
  .state h3{font-family:'Fraunces',serif;font-size:22px;margin-bottom:10px}
  .state p{color:var(--ink-soft);font-size:14px;margin-bottom:6px}
  .state .icon{font-size:42px;margin-bottom:16px;display:block}
  .state.error{border-color:#E5B0B0;background:#FCF6F4}
  .state pre{text-align:left;background:#F4EFE8;padding:14px;border-radius:10px;font-size:12px;margin-top:14px;overflow-x:auto;color:var(--ink-soft)}

  .table-wrap{max-height:600px;overflow-y:auto;border-radius:14px;border:1px solid var(--line)}

  @media(max-width:860px){
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .compare-grid{grid-template-columns:1fr;border-radius:14px}
    .cmp{border-right:none;border-bottom:1px solid var(--line)}
    .cmp:last-child{border-bottom:none}
    .hero{flex-direction:column;align-items:flex-start}
    .hero-right{align-items:flex-start}
  }

  /* ── Sub-abas (Relatórios) ─────────────────────────────── */
  .subtabs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:20px}
  .subtab{padding:9px 16px;font-size:13.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;border:none;background:none;
    border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .18s;border-radius:8px 8px 0 0;font-family:inherit}
  .subtab:hover{color:var(--ink);background:var(--line-soft)}
  .subtab.active{color:var(--grape);border-bottom-color:var(--grape);font-weight:600}
  .subpanel{display:none;animation:fade .3s ease}
  .subpanel.active{display:block}
  .mes-pick{margin-left:auto;padding:7px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;
    font-family:inherit;background:var(--paper);color:var(--ink);outline:none;cursor:pointer;transition:border .15s}
  .mes-pick:focus{border-color:var(--grape)}

  /* ── Meta input ────────────────────────────────────────── */
  .meta-input-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 16px;margin-bottom:20px;box-shadow:var(--shadow)}
  .meta-input-row label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;white-space:nowrap}
  .meta-input-row input{flex:1;max-width:180px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;font-family:'Fraunces',serif;font-weight:600;color:var(--ink);background:var(--paper);outline:none;transition:border .15s}
  .meta-input-row input:focus{border-color:var(--grape)}
  .meta-save-btn{background:var(--grape);color:#fff;border:none;padding:8px 16px;border-radius:8px;
    font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
  .meta-save-btn:hover{opacity:.85}
  .meta-saved{font-size:12px;color:var(--green-tx);font-weight:500}

  /* ── Farol ─────────────────────────────────────────────── */
  .farol-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .farol-item{flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;box-shadow:var(--shadow);text-align:center}
  .farol-item .f-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:6px}
  .farol-item .f-val{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:4px;line-height:1.1}
  .farol-item .f-pct{font-size:13px;font-weight:600}
  .farol-item.ok{border-color:#B5D99C;background:#F3FAF0}.farol-item.ok .f-pct{color:var(--green-tx)}
  .farol-item.no{border-color:#E5B0B0;background:#FCF6F4}.farol-item.no .f-pct{color:#A52A2A}
  .farol-item.neutral{border-color:var(--amber);background:var(--amber-bg)}.farol-item.neutral .f-pct{color:var(--amber-tx)}

  /* ── Tabela dia a dia ──────────────────────────────────── */
  .col-ant{color:var(--rose)!important}.col-atual{color:var(--sage)!important}
  .row-hoje td{background:rgba(93,202,165,.07)!important;font-weight:600}
  .row-futuro td{color:var(--ink-faint)!important}
  tfoot tr td{font-weight:700;background:var(--paper)}

  /* ── Gráficos ──────────────────────────────────────────── */
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;align-items:stretch}
  @media(max-width:760px){.chart-row{grid-template-columns:1fr}}
  .chart-box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow)}
  .chart-box h3{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin-bottom:16px}
  .chart-full{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:16px}
  .chart-full h3{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin-bottom:16px}

  /* ── Análise grid ──────────────────────────────────────── */
  .analise-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:760px){.analise-grid{grid-template-columns:1fr}}
  .analise-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)}
  .analise-card h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:3px}
  .analise-card .a-sub{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
  .a-row{display:grid;grid-template-columns:20px 1fr 90px 46px;gap:8px;align-items:center;
    padding:7px 2px;border-bottom:1px solid var(--line-soft)}
  .a-row:last-child{border-bottom:none}
  .a-rank{font-size:12px;color:var(--ink-faint);font-weight:600;text-align:center}
  .a-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .a-val{font-family:'Fraunces',serif;font-size:13px;font-weight:600;text-align:right;white-space:nowrap}
  .a-pct{font-size:11px;font-weight:600;text-align:right;color:var(--ink-soft)}
  .a-empty{text-align:center;padding:20px;color:var(--ink-faint);font-size:13px}
  .placeholder-card{background:var(--amber-bg);border:1px solid var(--amber);border-radius:14px;padding:16px;margin-top:8px}
  .placeholder-card strong{font-weight:600;display:block;margin-bottom:4px}
  .placeholder-card span{font-size:13px;color:var(--amber-tx)}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow"><span class="live-dot"></span>Dashboard · Shopify</div>
      <img src="mooui-dashboard.png" alt="MOOUI" class="hero-logo">
    </div>
    <div class="hero-right">
      <button class="refresh-btn" id="refresh-btn" onclick="carregar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.8 1 6.5 2.7L21 9"/>
          <path d="M21 4v5h-5"/>
        </svg>
        <span id="refresh-text">Atualizar agora</span>
      </button>
      <div class="updated" id="updated">Carregando dados…</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="vendas">💰 Vendas do dia</button>
    <button class="tab" data-tab="paginas">📊 Páginas mais visitadas</button>
    <button class="tab" data-tab="relatorios">📋 Relatórios</button>
  </div>

  <div class="panel active" id="panel-vendas">
    <div id="vendas-content">
      <div class="state"><span class="icon">⏳</span><h3>Carregando…</h3><p>Buscando vendas no Shopify</p></div>
    </div>
  </div>

  <div class="panel" id="panel-paginas">
    <div id="paginas-content">
      <div class="state"><span class="icon">⏳</span><h3>Carregando…</h3><p>Buscando dados de navegação</p></div>
    </div>
  </div>

  <div class="panel" id="panel-relatorios">
    <div id="relatorios-content">
      <div class="state"><span class="icon">📋</span><h3>Clique para carregar</h3><p>Os relatórios são carregados ao abrir esta aba</p></div>
    </div>
  </div>

</div>

<script>
const fmtMoney = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtInt = v => Number(v||0).toLocaleString('pt-BR');
const fmtPct = (n,d=1) => (n*100).toFixed(d).replace('.',',')+'%';
const fmtDateTime = iso => new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmtDate = iso => new Date(iso + 'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});

function delta(atual, anterior){
  const a = parseFloat(atual) || 0;
  const b = parseFloat(anterior) || 0;
  if (b === 0) return {pct:null, html:'<span class="delta delta-flat">—</span>'};
  const pct = (a - b) / Math.abs(b);
  if (Math.abs(pct) < 0.001) return {pct, html:`<span class="delta delta-flat">= ${fmtPct(pct,1)}</span>`};
  const seta = pct > 0 ? '↑' : '↓';
  const cls = pct > 0 ? 'delta-up' : 'delta-down';
  return {pct, html:`<span class="delta ${cls}">${seta} ${fmtPct(Math.abs(pct),1)}</span>`};
}

function pillClass(r){ if(r===0) return 'pill-n'; if(r>=0.05) return 'pill-g'; if(r>=0.02) return 'pill-a'; return 'pill-r'; }

// Identifica o tipo de página pela URL
function tipoDaPagina(path){
  if (!path) return 'outras';
  if (path.startsWith('/collections/')) return 'colecoes';
  if (path.startsWith('/products/')) return 'produtos';
  return 'outras';
}

// Label visível da tag
function tagDoTipo(tipo){
  if (tipo === 'colecoes') return '<span class="type-tag type-col">Coleção</span>';
  if (tipo === 'produtos') return '<span class="type-tag type-prod">Produto</span>';
  return '<span class="type-tag type-other">Outra</span>';
}

let DADOS = null;
let FILTRO_TIPO = 'colecoes';  // default: começa mostrando coleções (o que mais interessa)

function ymd(d){ return d.toISOString().slice(0,10); }
const _hoje = new Date();
const _ha30 = new Date(_hoje.getTime() - 30*86400000);
let FILTRO = { de: ymd(_ha30), ate: ymd(_hoje) };
let FILTRO_VENDAS = { de: ymd(_hoje), ate: ymd(_hoje) };

async function carregar(){
  const btn = document.getElementById('refresh-btn');
  const txt = document.getElementById('refresh-text');
  btn.disabled = true;
  btn.classList.add('loading');
  txt.textContent = 'Atualizando…';
  _convCarregado = false;
  DADOS_CONV = null;
  _recompraCarregado = false;
  DADOS_RECOMPRA = null;

  try {
    const url = `/api/dados?de=${FILTRO.de}&ate=${FILTRO.ate}&de_vendas=${FILTRO_VENDAS.de}&ate_vendas=${FILTRO_VENDAS.ate}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    DADOS = await resp.json();
    if (DADOS.erro) throw new Error(DADOS.erro);
    document.getElementById('updated').textContent = 'Atualizado em: ' + fmtDateTime(DADOS.atualizado_em);
    renderVendas();
    renderPaginas();
  } catch (e) {
    document.getElementById('vendas-content').innerHTML = `
      <div class="state error">
        <span class="icon">⚠️</span>
        <h3>Não consegui buscar os dados</h3>
        <p>Verifique se o servidor está rodando (<code>node servidor.js</code>) e se o .env está correto.</p>
        <pre>${e.message}</pre>
      </div>`;
    document.getElementById('paginas-content').innerHTML = '';
    document.getElementById('updated').textContent = 'Erro ao carregar';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    txt.textContent = 'Atualizar agora';
  }
}

function renderVendas(){
  const periodo = DADOS.periodo_vendas || { de: FILTRO_VENDAS.de, ate: FILTRO_VENDAS.ate, n_dias: 1 };
  const atual = DADOS.vendas_periodo?.rows?.[0];
  const anterior = DADOS.vendas_anterior?.rows?.[0];

  const isHoje = periodo.de === ymd(new Date()) && periodo.ate === ymd(new Date());
  const isOntem = periodo.n_dias === 1 && !isHoje;
  const labelAtual = isHoje ? 'hoje' : periodo.n_dias === 1 ? fmtDate(periodo.de) : `${fmtDate(periodo.de)} – ${fmtDate(periodo.ate)}`;
  const labelAnterior = isHoje ? 'ontem' : 'período anterior';
  const dias = periodo.n_dias || 1;

  const dateBar = `
    <div class="date-bar">
      <span class="lbl">Período:</span>
      <input type="date" id="vde" value="${periodo.de}">
      <span class="arrow">→</span>
      <input type="date" id="vate" value="${periodo.ate}">
      <button class="apply" onclick="aplicarPeriodoVendas()">Aplicar</button>
      <button class="preset" onclick="aplicarPresetVendas(1)">Hoje</button>
      <button class="preset" onclick="aplicarPresetVendas(-1)">Ontem</button>
      <button class="preset" onclick="aplicarPresetVendas(7)">7 dias</button>
      <button class="preset" onclick="aplicarPresetVendas(30)">30 dias</button>
      <span class="info">${dias} dia${dias>1?'s':''} · ${fmtDate(periodo.de)}${dias>1?' a '+fmtDate(periodo.ate):''}</span>
    </div>`;

  if (!atual){
    document.getElementById('vendas-content').innerHTML = dateBar + `<div class="state"><span class="icon">📭</span><h3>Sem vendas no período selecionado</h3></div>`;
    return;
  }

  const total = atual.total_sales || '0';
  const pedidos = atual.orders || '0';
  const descontos = Math.abs(parseFloat(atual.discounts || 0));
  const reversals = Math.abs(parseFloat(atual.sales_reversals || 0));

  const totalAnt = anterior?.total_sales || '0';
  const pedidosAnt = anterior?.orders || '0';

  const dTotal = delta(total, totalAnt);
  const dPedidos = delta(pedidos, pedidosAnt);

  const ticketMedio = parseFloat(pedidos) > 0 ? parseFloat(total) / parseFloat(pedidos) : 0;
  const ticketAnt = parseFloat(pedidosAnt) > 0 ? parseFloat(totalAnt) / parseFloat(pedidosAnt) : 0;
  const dTicket = delta(ticketMedio, ticketAnt);

  document.getElementById('vendas-content').innerHTML = dateBar + `
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Faturamento</div><div class="value">${fmtMoney(total)}</div><div class="sub">vs. ${labelAnterior} ${dTotal.html}</div></div>
      <div class="kpi sage"><div class="label">Pedidos</div><div class="value">${fmtInt(pedidos)}</div><div class="sub">vs. ${labelAnterior} ${dPedidos.html}</div></div>
      <div class="kpi grape"><div class="label">Ticket médio</div><div class="value">${fmtMoney(ticketMedio)}</div><div class="sub">vs. ${labelAnterior} ${dTicket.html}</div></div>
      <div class="kpi amber"><div class="label">Descontos / Cupons</div><div class="value">${fmtMoney(descontos)}</div><div class="sub">${descontos > 0 ? fmtPct(descontos / parseFloat(total || 1)) + ' do faturamento' : 'Nenhum cupom no período'}</div></div>
    </div>

    <div class="section-label">Detalhes do período</div>
    <div class="compare-grid">
      <div class="cmp"><div class="lbl">Vendas brutas</div><div class="val">${fmtMoney(atual.gross_sales || 0)}</div></div>
      <div class="cmp"><div class="lbl">Devoluções</div><div class="val" style="color:${reversals > 0 ? 'var(--rose)' : 'var(--ink)'}">${reversals > 0 ? '−' + fmtMoney(reversals) : fmtMoney(0)}</div><div class="ctx">${reversals > 0 ? 'reembolsos no período' : 'nenhuma devolução'}</div></div>
      <div class="cmp"><div class="lbl">Vendas líquidas</div><div class="val">${fmtMoney(atual.net_sales || 0)}</div></div>
    </div>

    <div class="two-col">
      <div class="top-card">
        <h3>🏆 Top 5 produtos</h3>
        <div class="h-sub">Ordenados por faturamento líquido · ${labelAtual}</div>
        <div id="top-produtos"></div>
      </div>
      <div class="top-card">
        <h3>🎟️ Cupons mais usados</h3>
        <div class="h-sub">Valor vendido com cada cupom · ${labelAtual}</div>
        <div id="top-cupons"></div>
      </div>
    </div>

    ${anterior ? `
      <div style="margin-top:24px">
        <div class="section-label">Comparativo: período atual vs. anterior</div>
        <div class="card" style="padding:8px 4px">
          <table>
            <thead><tr><th>Métrica</th><th>${labelAtual}</th><th>${labelAnterior}</th><th>Variação</th></tr></thead>
            <tbody>
              <tr><td>Faturamento</td><td>${fmtMoney(total)}</td><td>${fmtMoney(totalAnt)}</td><td>${dTotal.html}</td></tr>
              <tr><td>Pedidos</td><td>${fmtInt(pedidos)}</td><td>${fmtInt(pedidosAnt)}</td><td>${dPedidos.html}</td></tr>
              <tr><td>Ticket médio</td><td>${fmtMoney(ticketMedio)}</td><td>${fmtMoney(ticketAnt)}</td><td>${dTicket.html}</td></tr>
              <tr><td>Descontos</td><td>${fmtMoney(descontos)}</td><td>${fmtMoney(Math.abs(parseFloat(anterior.discounts || 0)))}</td><td>—</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    ` : ''}
  `;

  renderTopProdutos();
  renderTopCupons();
}

async function carregarConversao() {
  _convCarregado = true;
  const el = document.getElementById('subpanel-pag-conversao');
  if (!el) return;
  el.innerHTML = `<div class="state"><span class="icon">⏳</span><h3>Carregando…</h3><p>Buscando pedidos do período</p></div>`;
  try {
    const [resp, respAb] = await Promise.all([
      fetch(`/api/conversao?de=${FILTRO.de}&ate=${FILTRO.ate}`),
      fetch(`/api/checkouts?de=${FILTRO.de}&ate=${FILTRO.ate}`)
    ]);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    DADOS_CONV = await resp.json();
    if (DADOS_CONV.erro) throw new Error(DADOS_CONV.erro);
    DADOS_CONV._abandono = respAb.ok ? await respAb.json() : null;
    renderConversao();
  } catch(e) {
    el.innerHTML = `<div class="state error"><span class="icon">⚠️</span><h3>Erro ao carregar conversão</h3><pre>${e.message}</pre></div>`;
  }
}

        formatter:(v,ctx)=>{ const t=ctx.dataset.data.reduce((a,b)=>a+b,0); return t>0?Math.round(v/t*100)+'%':''; } } },
      layout:{ padding:{ top:30 } },
      scales:{ x:{ticks:tick, grid:grid}, y:{ticks:{...tick, stepSize:1}, grid:grid, beginAtZero:true} } }
  });

  // Gráfico: dia da semana
  if (c.dist_diasemana) {
    const dsVals = Object.values(c.dist_diasemana);
    const dsPeak = Math.max(...dsVals);
    chartsConv['conv-diasemana'] = new Chart(document.getElementById('conv-diasemana'), {
      type: 'bar',
      data: { labels: Object.keys(c.dist_diasemana), datasets: [{
        data: dsVals,
        backgroundColor: coresPico(dsVals, 'rgba(127,119,221,.6)', '#E07856'),
        borderRadius: 4,
      }]},
      options: { responsive:true, plugins:{legend:{display:false},
        tooltip:{ callbacks:{ label: ctx => { const v=ctx.parsed.y; const t=dsVals.reduce((a,b)=>a+b,0); const p=t>0?Math.round(v/t*100):0; return `  ${p}% · ${v} pedidos`; }}},
        datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0, anchor:'center', align:'center', color:'#fff', font:{size:10,family:"'Outfit',sans-serif",weight:'600'}, formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return t>0?Math.round(v/t*100)+'%':''}}},
        scales:{ x:{ticks:tick,grid:grid}, y:{ticks:{...tick,stepSize:1},grid:grid,beginAtZero:true} } }
    });
  }

  // Gráfico: origem (barras horizontais)
  const origLabels = c.por_origem.map(o=>o.origem);
  const origVals   = c.por_origem.map(o=>o.count);
  const origTotal = origVals.reduce((a,b)=>a+b,0);
  chartsConv['conv-origem'] = new Chart(document.getElementById('conv-origem'), {
    type: 'bar',
    data: { labels: origLabels, datasets: [{ data: origVals, backgroundColor: '#7F77DD', borderRadius: 4 }]},
    options: { indexAxis:'y', responsive:true, plugins:{
      legend:{display:false},
      tooltip:{ callbacks:{ label: ctx => { const v=ctx.parsed.x; const p=origTotal>0?Math.round(v/origTotal*100):0; return `  ${p}% · ${v} pedidos`; }}},
      datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0, anchor:'center', align:'center', color:'#fff', font:{size:10,family:"'Outfit',sans-serif",weight:'600'}, formatter:(v)=>{const p=origTotal>0?Math.round(v/origTotal*100):0;return p+'%'}}
    },
    scales:{ x:{ticks:tick, grid:grid}, y:{ticks:{font:{...baseFont,size:11},color:'#6B645C'}, grid:{display:false}} } }
  });

  // Gráfico: último toque — como fechou (barras horizontais)
  if (c.por_origem_fechamento) {
    const fechLabels = c.por_origem_fechamento.map(o=>o.origem);
    const fechVals   = c.por_origem_fechamento.map(o=>o.count);
    const fechTotal  = fechVals.reduce((a,b)=>a+b,0);
    chartsConv['conv-origem-fechamento'] = new Chart(document.getElementById('conv-origem-fechamento'), {
      type: 'bar',
      data: { labels: fechLabels, datasets: [{ data: fechVals, backgroundColor: '#5DCAA5', borderRadius: 4 }]},
      options: { indexAxis:'y', responsive:true, plugins:{
        legend:{display:false},
        tooltip:{ callbacks:{ label: ctx => { const v=ctx.parsed.x; const p=fechTotal>0?Math.round(v/fechTotal*100):0; return `  ${p}% · ${v} pedidos`; }}},
        datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0, anchor:'center', align:'center', color:'#fff', font:{size:10,family:"'Outfit',sans-serif",weight:'600'}, formatter:(v)=>{const p=fechTotal>0?Math.round(v/fechTotal*100):0;return p+'%'}}
      },
      scales:{ x:{ticks:tick, grid:grid}, y:{ticks:{font:{...baseFont,size:11},color:'#6B645C'}, grid:{display:false}} } }
    });
  }

  // Gráfico: sessões até comprar — rosca
  const sesLabels = Object.keys(c.dist_sessoes);
  const sesVals   = Object.values(c.dist_sessoes);
  const sesCores  = ['#7F77DD','#5DCAA5','#D4982F','#E07856','#D4537E','#9A938A'];
  const sesTotal  = sesVals.reduce((a,b)=>a+b,0);
  chartsConv['conv-sessoes'] = new Chart(document.getElementById('conv-sessoes'), {
    type: 'doughnut',
    data: { labels: sesLabels.map(k=>k+' '+(k==='1'?'sessão':'sessões')), datasets: [{
      data: sesVals, backgroundColor: sesCores, borderWidth: 2, borderColor: '#fff',
    }]},
    options: { responsive:true, cutout:'60%',
      plugins:{
        legend:{ display:true, position:'right', labels:{ font:baseFont, color:'#6B645C', boxWidth:12, padding:10 } },
        datalabels:{ display: ctx => ctx.dataset.data[ctx.dataIndex] > 0, color:'#fff', font:{size:11,family:"'Outfit',sans-serif",weight:'600'},
          formatter: (v) => { const p = sesTotal>0?Math.round(v/sesTotal*100):0; return p>0?p+'%':''; }
        }
      }
    }
  });

  // Gráfico: concluídos vs abandonados
  if (c._abandono) {
    const ab = c._abandono;
    const abConcluidos = c.total;
    const abAbandonados = ab.total;
    const abTotal = abConcluidos + abAbandonados;
    const abValor = parseFloat(ab.valor || 0);
    chartsConv['conv-abandono'] = new Chart(document.getElementById('conv-abandono'), {
      type: 'doughnut',
      data: {
        labels: ['Concluídos', 'Abandonados'],
        datasets: [{ data: [abConcluidos, abAbandonados], backgroundColor: ['#5DCAA5','#E07856'], borderWidth: 2, borderColor: '#fff' }]
      },
      options: { responsive:true, cutout:'60%',
        plugins:{
          legend:{ display:true, position:'bottom', labels:{ font:baseFont, color:'#6B645C', boxWidth:12, padding:10 } },
          datalabels:{ display: ctx => ctx.dataset.data[ctx.dataIndex] > 0, color:'#fff', font:{size:11,family:"'Outfit',sans-serif",weight:'600'},
            formatter: (v) => { const p = abTotal>0?Math.round(v/abTotal*100):0; return p>0?p+'%':''; }
          }
        }
      }
    });
    const valorEl = document.getElementById('conv-abandono-valor');
    if (valorEl) valorEl.textContent = `R$ ${parseFloat(ab.valor).toLocaleString('pt-BR',{minimumFractionDigits:2})} em carrinhos abandonados`;
  }

  // Gráfico: dias até comprar
  const diasLabels = Object.keys(c.dist_dias);
  const diasVals   = Object.values(c.dist_dias);
  const maxDias = Math.max(...diasVals);
  chartsConv['conv-dias'] = new Chart(document.getElementById('conv-dias'), {
    type: 'bar',
    data: { labels: diasLabels, datasets: [{ data: diasVals, backgroundColor: coresPico(diasVals,'#D4982F','#E07856'), borderRadius: 4 }]},
    options: { responsive:true, layout:{padding:{top:20}}, plugins:{legend:{display:false},
      tooltip:{ callbacks:{ label: ctx => { const v=ctx.parsed.y; const t=diasVals.reduce((a,b)=>a+b,0); const p=t>0?Math.round(v/t*100):0; return `  ${p}% · ${v} clientes`; }}},
      datalabels:{
        display: ctx => diasVals[ctx.dataIndex] > 0,
        anchor: ctx => diasVals[ctx.dataIndex]/maxDias < 0.12 ? 'end' : 'center',
        align:  ctx => diasVals[ctx.dataIndex]/maxDias < 0.12 ? 'top'  : 'center',
        clamp: true,
        color:  ctx => diasVals[ctx.dataIndex]/maxDias < 0.12 ? '#6B645C' : '#fff',
        font:{size:10,family:"'Outfit',sans-serif",weight:'600'},
        formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return t>0?Math.round(v/t*100)+'%':''}
      }},
      scales:{ x:{ticks:tick,grid:grid}, y:{ticks:{...tick,stepSize:1},grid:grid,beginAtZero:true} } }
  });

  // Gráfico: jornada de aquisição (apenas clientes novos)
  if (c.dist_aquisicao) {
    const acqLabels = Object.keys(c.dist_aquisicao);
    const acqVals   = Object.values(c.dist_aquisicao);
    const maxAcq    = Math.max(...acqVals);
    chartsConv['conv-aquisicao'] = new Chart(document.getElementById('conv-aquisicao'), {
      type: 'bar',
      data: { labels: acqLabels, datasets: [{ data: acqVals, backgroundColor: coresPico(acqVals,'#7F77DD','#E07856'), borderRadius: 4 }]},
      options: { responsive:true, layout:{padding:{top:20}}, plugins:{legend:{display:false},
        tooltip:{ callbacks:{ label: ctx => { const v=ctx.parsed.y; const t=acqVals.reduce((a,b)=>a+b,0); const p=t>0?Math.round(v/t*100):0; return `  ${p}% · ${v} clientes`; }}},
        datalabels:{
          display: ctx => acqVals[ctx.dataIndex] > 0,
          anchor: ctx => acqVals[ctx.dataIndex]/maxAcq < 0.12 ? 'end' : 'center',
          align:  ctx => acqVals[ctx.dataIndex]/maxAcq < 0.12 ? 'top'  : 'center',
          clamp: true,
          color:  ctx => acqVals[ctx.dataIndex]/maxAcq < 0.12 ? '#6B645C' : '#fff',
          font:{size:10,family:"'Outfit',sans-serif",weight:'600'},
          formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return t>0?Math.round(v/t*100)+'%':''}
        }},
        scales:{ x:{ticks:tick,grid:grid}, y:{ticks:{...tick,stepSize:1},grid:grid} } }
    });
  }

  // Seção de recompra
  if (_recompraCarregado && DADOS_RECOMPRA) {
    renderRecompra();
  } else {
    carregarRecompra();
  }

}

async function carregarRecompra() {
  _recompraCarregado = true;
  const body = document.getElementById('recompra-body');
  if (!body) return;
  body.innerHTML = `<div class="state"><span class="icon">⏳</span><h3>Carregando histórico…</h3><p>Consultando até 1.000 clientes com 2+ pedidos</p></div>`;
  try {
    const resp = await fetch('/api/recompra');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    DADOS_RECOMPRA = await resp.json();
    if (DADOS_RECOMPRA.erro) throw new Error(DADOS_RECOMPRA.erro);
    renderRecompra();
  } catch(e) {
    body.innerHTML = `<div class="state error"><span class="icon">⚠️</span><h3>Erro ao carregar recompra</h3><pre>${e.message}</pre></div>`;
    _recompraCarregado = false;
  }
}

function coresPico(data, cor, corPico) {
  const max = Math.max(...data);
  return data.map(v => v > 0 && v === max ? corPico : cor);
}

function trocarSegmentoRecompra(seg) {
  _recompraSegmento = seg;
  document.querySelectorAll('.chip-rec').forEach(b => b.classList.toggle('on', b.dataset.seg === seg));
  if (chartsConv['rec-chart'] && DADOS_RECOMPRA) {
    const d = DADOS_RECOMPRA[seg];
    const vals = Object.values(d.dist);
    chartsConv['rec-chart'].data.datasets[0].data = vals;
    chartsConv['rec-chart'].data.datasets[0].backgroundColor = coresPico(vals, '#D4982F', '#E07856');
    chartsConv['rec-chart'].update();
    document.getElementById('rec-media').textContent = d.media + ' dias';
    document.getElementById('rec-total').textContent = fmtInt(d.total) + ' clientes';
  }
}

function renderRecompra() {
  const body = document.getElementById('recompra-body');
  if (!body || !DADOS_RECOMPRA) return;
  ['rec-chart','rec-combinado','rec-terceira','rec-produtos'].forEach(id => {
    if (chartsConv[id]) { chartsConv[id].destroy(); delete chartsConv[id]; }
  });

  const r = DADOS_RECOMPRA;
  const d = r[_recompraSegmento] || r.ate1k;
  const truncNote = r.truncado ? ` · amostra de ${fmtInt(r.total_consultados)} clientes` : '';

  body.innerHTML = `
<div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">

      <div class="kpi"><div class="label">Só 1 pedido</div><div class="value">${fmtInt(r.total_1_pedido)}</div><div class="sub">nunca voltaram</div></div>
      <div class="kpi sage"><div class="label">Ticket médio — 1º pedido</div><div class="value" style="font-size:18px">${r.ticket_medio_1}</div><div class="sub">média dos clientes analisados</div></div>
      <div class="kpi ${r.ticket_variacao > 0 ? 'grape' : 'amber'}"><div class="label">Ticket médio — 2º pedido</div><div class="value" style="font-size:18px">${r.ticket_medio_2 || '—'}</div><div class="sub">${r.ticket_variacao != null ? (r.ticket_variacao > 0 ? '▲' : '▼') + ' ' + Math.abs(r.ticket_variacao) + '% vs 1º pedido' : '—'}</div></div>
      <div class="kpi"><div class="label">Fizeram 3ª compra</div><div class="value">${fmtInt(r.terceira?.total ?? 0)}</div><div class="sub">média ${r.terceira?.media ?? '—'} dias após 2ª</div></div>
    </div>

    <h4 style="margin:0 0 4px;font-size:13px;font-weight:600;color:var(--ink-mid)">Recompra por faixa + curva de quem ainda não voltou</h4>
    <p style="margin:0 0 12px;font-size:12px;color:var(--ink-faint)">
      Barras: % que voltou em cada faixa &nbsp;·&nbsp; Linhas: % que ainda não tinha voltado — <span style="color:#7F77DD;font-weight:600">Todos: ${fmtInt(r.todos.total)} clientes · média ${r.todos.media} dias</span> &nbsp;·&nbsp; <span style="color:#5DCAA5;font-weight:600">Bebê/berço: ${fmtInt(r.bebe.total)} clientes · média ${r.bebe.media} dias</span>
    </p>
    <canvas id="rec-combinado" height="100" style="margin-bottom:28px"></canvas>

    <div style="display:flex;gap:8px;margin:0 0 12px;align-items:center;flex-wrap:wrap">

      <button class="chip chip-rec ${_recompraSegmento==='acima1k'?'on':''}" data-seg="acima1k" onclick="trocarSegmentoRecompra('acima1k')">Acima de R$ 1.000</button>
      <span style="margin-left:8px;font-size:13px;color:var(--ink-faint)">Média: <strong id="rec-media">${d.media} dias</strong> · <strong id="rec-total">${fmtInt(d.total)} clientes</strong>${truncNote}</span>
    </div>
    <canvas id="rec-chart" height="60"></canvas>

    <h4 style="margin:28px 0 4px;font-size:13px;font-weight:600;color:var(--ink-mid)">Quando fazem a 3ª compra</h4>
    <p style="margin:0 0 12px;font-size:12px;color:var(--ink-faint)">Dias entre a 2ª e a 3ª compra — apenas clientes com 3+ pedidos (${fmtInt(r.terceira?.total ?? 0)} clientes · média ${r.terceira?.media ?? '—'} dias)</p>
    <canvas id="rec-terceira" height="60" style="margin-bottom:28px"></canvas>

    <h4 style="margin:28px 0 4px;font-size:13px;font-weight:600;color:var(--ink-mid)">Produtos mais comprados na 2ª compra</h4>
    <p style="margin:0 0 12px;font-size:12px;color:var(--ink-faint)">O que os clientes compram quando voltam à loja</p>
    <canvas id="rec-produtos" height="100"></canvas>

    <h4 style="margin:32px 0 4px;font-size:13px;font-weight:600;color:var(--ink-mid)">Produto — 1º ao 2º pedido</h4>
    <p style="margin:0 0 12px;font-size:12px;color:var(--ink-faint)">Top 10 combinações mais frequentes entre categorias diferentes — oportunidades de cross-sell</p>
    <div id="rec-transicoes"></div>`;

  const baseFont = { family: "'Outfit', sans-serif" };
  const tick = { font: { ...baseFont, size: 11 }, color: '#9A938A' };
  const grid = { color: '#F0ECE4' };


  // Gráfico combinado: barras (% por faixa) + linhas de sobrevivência todos e bebê
  function calcSob(dist) {
    const vals = Object.values(dist);
    const total = vals.reduce((a,b) => a+b, 0);
    let cum = 0;
    return vals.map(v => { cum += total > 0 ? Math.round(v/total*100) : 0; return Math.max(0, 100 - cum); });
  }
  const todosVals = Object.values(r.todos.dist);
  const todosTotal = todosVals.reduce((a,b) => a+b, 0);
  const todosPct = todosVals.map(v => todosTotal > 0 ? Math.round(v/todosTotal*100) : 0);
  const sobAcum = calcSob(r.todos.dist);
  const sobBebe2 = calcSob(r.bebe.dist);

  chartsConv['rec-combinado'] = new Chart(document.getElementById('rec-combinado'), {
    type: 'bar',

      labels,

        {

          }

        {
          type: 'line',
          label: 'Ainda não voltou — todos',
          data: sobAcum,

          pointRadius: 5, pointHoverRadius: 7,

            formatter: v => v + '%'
          }
        },
        {
          type: 'line',
          label: 'Ainda não voltou — bebê/berço',
          data: sobBebe2,
          borderColor: '#5DCAA5',
          backgroundColor: 'transparent',
          pointBackgroundColor: '#5DCAA5',
          pointRadius: 5, pointHoverRadius: 7,
          borderWidth: 2.5, tension: 0.3, borderDash: [5,4],

      layout: { padding: { top: 24 } },

        legend: { display: true, labels: { font: baseFont, color: '#6B645C', boxWidth: 12, padding: 16 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = ctx.parsed.y;

                const qtd = todosVals[ctx.dataIndex];
                return ` Voltaram nesta faixa: ${pct}% (${qtd} clientes)`;

              if (ctx.datasetIndex === 1) {
                const qtd = Math.round(pct / 100 * r.todos.total);

              if (ctx.datasetIndex === 2) {

        }
      },
      scales: {
        x: { ticks: { ...tick, font: { ...tick.font, size: 10 } }, grid },

    }
  });

      labels,

    },
    options: { responsive:true, plugins:{legend:{display:false}, datalabels:{
      display: ctx => ctx.dataset.data[ctx.dataIndex] > 0,

    data: {
      labels: Object.keys(r.terceira.dist),

  if (prods.length > 0) {

      type: 'bar',
      data: {
        labels: prods.map(p => p.titulo),

      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: {
          legend: { display: false },
          datalabels: {

function exportarCSV() {
  if (!window._csCSV) return;
  const blob = new Blob([window._csCSV], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: 'crosssell.csv' });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function aplicarFiltrosTabela(){
  const visitas = DADOS.visitas?.rows || [];
  const q = (document.getElementById('busca')?.value || '').toLowerCase().trim();

  // Filtra por tipo
  let filtradas = FILTRO_TIPO === 'todas'
    ? visitas
    : visitas.filter(r => tipoDaPagina(r.landing_page_path) === FILTRO_TIPO);

  // Filtra por busca
  if (q) filtradas = filtradas.filter(r => (r.landing_page_path || '').toLowerCase().includes(q));

  // KPIs do conjunto filtrado
  const totSes = filtradas.reduce((a,r) => a + parseInt(r.sessions || 0), 0);
  const totVis = filtradas.reduce((a,r) => a + parseInt(r.online_store_visitors || 0), 0);
  const totCart = filtradas.reduce((a,r) => a + parseInt(r.sessions_with_cart_additions || 0), 0);
  const totCk = filtradas.reduce((a,r) => a + parseInt(r.sessions_that_completed_checkout || 0), 0);

  const kpisEl = document.getElementById('kpis-filtrados');
  if (kpisEl) {
    kpisEl.innerHTML = `
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px">
        <div class="kpi sage"><div class="label">Páginas</div><div class="value">${fmtInt(filtradas.length)}</div><div class="sub">no filtro atual</div></div>
        <div class="kpi grape"><div class="label">Sessões</div><div class="value">${fmtInt(totSes)}</div><div class="sub">${fmtInt(totVis)} visitantes únicos</div></div>
        <div class="kpi amber"><div class="label">Adições ao carrinho</div><div class="value">${fmtInt(totCart)}</div><div class="sub">${totSes>0?fmtPct(totCart/totSes,1):'—'} das sessões</div></div>
        <div class="kpi rose"><div class="label">Checkouts</div><div class="value">${fmtInt(totCk)}</div><div class="sub">conversão: ${totSes>0?fmtPct(totCk/totSes,2):'—'}</div></div>
      </div>`;
  }

  const countEl = document.getElementById('count-tabela');
  if (countEl) countEl.textContent = `${filtradas.length} de ${visitas.length} páginas`;

  const max = Math.max(...filtradas.map(r => parseInt(r.sessions || 0)), 1);
  renderTabela(filtradas, max);
}

function renderTabela(linhas, maxSessoes){
  const tbody = document.getElementById('tbody-paginas');
  if (!tbody) return;
  if (!linhas.length){
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--ink-faint)">Nenhuma página encontrada com este filtro</td></tr>';
    return;
  }
  tbody.innerHTML = linhas.map(r => {
    const s = parseInt(r.sessions || 0);
    const v = parseInt(r.online_store_visitors || 0);
    const cart = parseInt(r.sessions_with_cart_additions || 0);
    const ck = parseInt(r.sessions_that_completed_checkout || 0);
    const cr = s > 0 ? cart/s : 0;
    const kr = s > 0 ? ck/s : 0;
    const w = maxSessoes > 0 ? (s/maxSessoes)*80 : 3;
    const tipo = tipoDaPagina(r.landing_page_path);
    return `
      <tr>
        <td title="${r.landing_page_path}">${tagDoTipo(tipo)}${r.landing_page_path}</td>
        <td>${fmtInt(s)}</td>
        <td>${fmtInt(v)}</td>
        <td><span class="pill ${pillClass(cr)}">${fmtPct(cr,1)}</span></td>
        <td><span class="pill ${pillClass(kr)}">${fmtPct(kr,1)}</span></td>
        <td><div class="minibar-wrap"><span class="minibar" style="width:${Math.max(w,3)}px"></span></div></td>
      </tr>`;
  }).join('');
}

let DADOS_REL = null;

let SUBTAB_REL = 'mes';
let _relCarregado = false;
const chartsRel = {};

function mesNomePT(mesStr) {
  return new Date(mesStr + '-15T12:00:00').toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
}
function diasDoMes(ano, mes) { return new Date(ano, mes, 0).getDate(); }
function diaSemPT(ano, mes, dia) {
  return ['DOM','SEG','TER','QUA','QUI','SEX','SAB'][new Date(ano, mes-1, dia).getDay()];
}
function destroyChartRel(id) {
  if (chartsRel[id]) { chartsRel[id].destroy(); delete chartsRel[id]; }
}
function parseMeta(str) {
  return parseFloat((str || '0').replace(/\./g,'').replace(',','.')) || 0;
}

async function carregarRelatorios() {
  _relCarregado = true;

// ── Sub-aba MÊS ──────────────────────────────────────────────
function renderMesRel(meta) {
  const d = DADOS_REL;
  const [ano, mesNum] = MES_REL.split('-').map(Number);
  const totalDias = diasDoMes(ano, mesNum);
  const anoAnt = ano - 1;

  // Calcula "dia de hoje" no contexto do mês selecionado
  const agora   = new Date();
  const mesHoje = agora.getFullYear() * 12 + agora.getMonth();
  const mesRel  = ano * 12 + (mesNum - 1);
  let diaHoje;
  if (mesHoje === mesRel) diaHoje = agora.getDate();
  else if (mesHoje > mesRel) diaHoje = totalDias;
  else diaHoje = 0;

  const diasFechados = Math.max(0, diaHoje - 1);
  const diasRestantes = Math.max(0, totalDias - diasFechados);

  // Mapas dia → row
  const mapAt = {}, mapAn = {};
  (d.vendas_diarias?.rows || []).forEach(r => {
    const n = parseInt((r.day||'').slice(0,10).slice(-2), 10); if (n) mapAt[n] = r; });
  (d.vendas_diarias_ant?.rows || []).forEach(r => {
    const n = parseInt((r.day||'').slice(0,10).slice(-2), 10); if (n) mapAn[n] = r; });

  // Totais
  const acumulado   = Object.values(mapAt).reduce((a,r) => a+parseFloat(r.total_sales||0), 0);
  const pedidosAcum = Object.values(mapAt).reduce((a,r) => a+parseInt(r.orders||0), 0);
  const acumAnt     = Object.entries(mapAn).filter(([n])=>parseInt(n)<=diaHoje)
                        .reduce((a,[,r]) => a+parseFloat(r.total_sales||0), 0);
  const totalAnt    = Object.values(mapAn).reduce((a,r) => a+parseFloat(r.total_sales||0), 0);
  const totalPAnt   = Object.values(mapAn).reduce((a,r) => a+parseInt(r.orders||0), 0);

  const metaDiaria    = meta > 0 ? meta / totalDias : 0;
  const fatMedio      = diasFechados > 0 ? acumulado / diasFechados : 0;
  const fatNecessario = meta > 0 && diasRestantes > 1 ? Math.max(0, (meta - acumulado) / diasRestantes) : 0;
  const pctMeta       = meta > 0 ? acumulado / meta : 0;

  // Farol helper
  function farolHTML(label, threshold, ratio) {
    if (ratio === null) return `<div class="farol-item neutral"><div class="f-label">${label}</div><div class="f-val">${fmtMoney(threshold)}</div><div class="f-pct">—</div></div>`;
    const ok = ratio >= 1;
    const pct = ((ratio - 1) * 100).toFixed(1).replace('.', ',');
    return `<div class="farol-item ${ok?'ok':'no'}">
      <div class="f-label">${label}</div>
      <div class="f-val">${fmtMoney(threshold)}</div>
      <div class="f-pct">${ok?'✅':'❌'} ${ratio>=1?'+':''}${pct}%</div>
    </div>`;
  }

  // Dados para tabela + gráficos
  const labels=[], dtAt=[], dtAn=[], dtAtAcum=[], dtAnAcum=[], dtPAt=[], dtPAn=[];
  let accAt=0, accAn=0;
  let tabelaRows = '';
  for (let dd = 1; dd <= totalDias; dd++) {
    const rAt = mapAt[dd], rAn = mapAn[dd];
    const vAt = parseFloat(rAt?.total_sales||0), vAn = parseFloat(rAn?.total_sales||0);
    const pAt = parseInt(rAt?.orders||0),        pAn = parseInt(rAn?.orders||0);
    accAt += vAt; accAn += vAn;
    labels.push(dd); dtAt.push(vAt); dtAn.push(vAn);
    dtAtAcum.push(accAt); dtAnAcum.push(accAn);
    dtPAt.push(pAt); dtPAn.push(pAn);

    const isFut  = dd > diaHoje;
    const isHoje = dd === diaHoje && mesHoje === mesRel;
    const cls    = isHoje ? 'row-hoje' : isFut ? 'row-futuro' : '';
    const sem    = diaSemPT(ano, mesNum, dd);

    tabelaRows += `<tr class="${cls}">
      <td style="text-align:center">${dd}</td>
      <td style="text-align:center">${sem}</td>
      <td class="col-ant">${vAn>0?fmtMoney(vAn):'-'}</td>
      <td class="col-ant" style="text-align:center">${pAn>0?pAn:'-'}</td>
      <td>${meta>0?fmtMoney(metaDiaria):'-'}</td>
      <td class="col-atual">${!isFut&&vAt>0?fmtMoney(vAt):isFut?'':'-'}</td>
      <td class="col-atual" style="text-align:center">${!isFut&&pAt>0?pAt:isFut?'':'-'}</td>
    </tr>`;
  }
  const totalVAt = Object.values(mapAt).reduce((a,r)=>a+parseFloat(r.total_sales||0),0);
  const totalPAt = Object.values(mapAt).reduce((a,r)=>a+parseInt(r.orders||0),0);
  const mesNome  = mesNomePT(MES_REL);

  document.getElementById('subpanel-mes').innerHTML = `
    <div class="meta-input-row">
      <label>Meta ${mesNome}:</label>
      <input type="text" id="meta-input" value="${meta>0?fmtInt(Math.round(meta)):''}" placeholder="Ex: 544218">
      <button class="meta-save-btn" onclick="salvarMeta()">Salvar meta</button>
      ${meta>0?'<span class="meta-saved">✓ Meta salva</span>':''}
    </div>

    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi sage"><div class="label">Acumulado do mês</div><div class="value">${fmtMoney(acumulado)}</div><div class="sub">${fmtInt(pedidosAcum)} pedidos · ${diasFechados} dias fechados</div></div>
      <div class="kpi"><div class="label">Meta mensal</div><div class="value">${meta>0?fmtMoney(meta):'—'}</div><div class="sub">${meta>0?fmtPct(pctMeta,1)+' realizado':'Defina a meta acima'}</div></div>
      <div class="kpi grape"><div class="label">Fat. diário médio</div><div class="value">${diasFechados>0?fmtMoney(fatMedio):'—'}</div><div class="sub">Meta diária: ${meta>0?fmtMoney(metaDiaria):'—'}</div></div>
      <div class="kpi amber"><div class="label">Necessário p/ meta</div><div class="value">${meta>0&&diasRestantes>1?fmtMoney(fatNecessario):'—'}</div><div class="sub">${diasRestantes} dias restantes no mês</div></div>
    </div>

    ${meta>0?`
    <div class="section-label" style="margin-bottom:12px">Farol de Metas · ${mesNome}</div>
    <div class="farol-row">
      ${farolHTML('Meta 80%', meta*0.8, acumulado/(meta*0.8))}
      ${farolHTML('Meta 100%', meta, acumulado/meta)}
      ${farolHTML('Meta 120%', meta*1.2, acumulado/(meta*1.2))}
      <div class="farol-item neutral" style="min-width:180px">
        <div class="f-label">${anoAnt} mesmo período</div>
        <div class="f-val">${fmtMoney(acumAnt)}</div>
        <div class="f-pct">${acumAnt>0?(((acumulado/acumAnt-1)*100)>=0?'+':'')+(((acumulado/acumAnt-1)*100).toFixed(1).replace('.',','))+'% YoY':'—'}</div>
      </div>
    </div>`:''}

    <div class="chart-full">
      <h3>Faturamento Acumulado — ${anoAnt} × ${ano}</h3>
      <canvas id="chart-acum" height="70"></canvas>
    </div>
    <div class="chart-row">
      <div class="chart-box"><h3>Faturamento por Dia</h3><canvas id="chart-diario" height="120"></canvas></div>
      <div class="chart-box"><h3>Pedidos por Dia</h3><canvas id="chart-pedidos" height="120"></canvas></div>
    </div>

    <div class="section-label" style="margin-bottom:8px">Dia a dia — ${anoAnt} × ${ano}</div>
    <div class="card" style="padding:4px;margin-bottom:0">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Dia</th><th>Sem</th>
            <th class="col-ant">${anoAnt} Vendas</th><th class="col-ant">${anoAnt} Ped.</th>
            <th>Meta</th>
            <th class="col-atual">${ano} Vendas</th><th class="col-atual">${ano} Ped.</th>
          </tr></thead>
          <tbody>${tabelaRows}</tbody>
          <tfoot><tr>
            <td colspan="2" style="text-align:left">Total</td>
            <td class="col-ant">${fmtMoney(totalAnt)}</td>
            <td class="col-ant" style="text-align:center">${fmtInt(totalPAnt)}</td>
            <td>${meta>0?fmtMoney(meta):'—'}</td>
            <td class="col-atual">${fmtMoney(totalVAt)}</td>
            <td class="col-atual" style="text-align:center">${fmtInt(totalPAt)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>`;

  // Gráficos
  const baseFont = { family: "'Outfit', sans-serif" };
  const tickStyle = { font: { ...baseFont, size: 11 }, color: '#9A938A' };
  const gridStyle = { color: '#F0ECE4' };

  chartsRel['acum'] = new Chart(document.getElementById('chart-acum'), {
    type: 'line',
    data: { labels, datasets: [
      { label: String(anoAnt), data: dtAnAcum, borderColor:'#D4537E', backgroundColor:'rgba(212,83,126,.07)', tension:.3, pointRadius:2, borderWidth:2 },
      { label: String(ano),    data: dtAtAcum, borderColor:'#5DCAA5', backgroundColor:'rgba(93,202,165,.07)', tension:.3, pointRadius:2, borderWidth:2.5 },
    ]},
    options: { responsive:true, plugins:{ legend:{ labels:{ font:baseFont, color:'#6B645C' } } },
      scales:{ x:{ ticks:tickStyle, grid:gridStyle }, y:{ ticks:{ ...tickStyle, callback: v=>'R$'+(v/1000).toFixed(0)+'k' }, grid:gridStyle } } }
  });

  chartsRel['diario'] = new Chart(document.getElementById('chart-diario'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: String(anoAnt), data: dtAn, backgroundColor:'rgba(212,83,126,.7)', borderRadius:3 },
      { label: String(ano),    data: dtAt, backgroundColor:'rgba(93,202,165,.8)', borderRadius:3 },
    ]},
    options: { responsive:true, plugins:{ legend:{ labels:{ font:baseFont, color:'#6B645C' } }, datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0, anchor:'center', align:'center', color:'#fff', font:{size:8,family:"'Outfit',sans-serif",weight:'600'}, formatter:v=>v>=1000?'R$'+(v/1000).toFixed(0)+'k':'R$'+v}},
      scales:{ x:{ ticks:tickStyle, grid:gridStyle }, y:{ ticks:{ ...tickStyle, callback: v=>'R$'+(v/1000).toFixed(0)+'k' }, grid:gridStyle } } }
  });

  chartsRel['pedidos'] = new Chart(document.getElementById('chart-pedidos'), {
    type: 'line',
    data: { labels, datasets: [
      { label: String(anoAnt), data: dtPAn, borderColor:'#D4537E', tension:.3, pointRadius:2, borderWidth:2 },
      { label: String(ano),    data: dtPAt, borderColor:'#5DCAA5', tension:.3, pointRadius:2, borderWidth:2.5 },
    ]},
    options: { responsive:true, plugins:{ legend:{ labels:{ font:baseFont, color:'#6B645C' } } },
      scales:{ x:{ ticks:tickStyle, grid:gridStyle }, y:{ ticks:tickStyle, grid:gridStyle } } }
  });
}

// ── Sub-aba ANÁLISE ──────────────────────────────────────────
function renderAnaliseRel() {
  const d = DADOS_REL;
  const mesNome = mesNomePT(MES_REL);

  function analiseCard(icon, titulo, rows, nomeKey, valorKey) {
    if (!rows?.length) return `<div class="analise-card"><h3>${icon} ${titulo}</h3><div class="a-sub">${mesNome}</div><div class="a-empty">Sem dados no período</div></div>`;
    const total = rows.reduce((a,r) => a + parseFloat(r[valorKey]||0), 0);
    const items = rows.filter(r => parseFloat(r[valorKey]||0) > 0).slice(0, 15);
    return `<div class="analise-card">
      <h3>${icon} ${titulo}</h3>
      <div class="a-sub">${mesNome} · Total: ${fmtMoney(total)}</div>
      ${items.map((r,i) => {
        const val = parseFloat(r[valorKey]||0);
        return `<div class="a-row">
          <div class="a-rank">${i+1}</div>
          <div class="a-name" title="${r[nomeKey]||'—'}">${r[nomeKey]||'—'}</div>
          <div class="a-val">${fmtMoney(val)}</div>
          <div class="a-pct">${fmtPct(total>0?val/total:0,1)}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Lançamentos: filtra apenas tags que começam com ano (padrão: 2019_, 2025_, 2026_drop_5, etc.)
  const lancamentoRows = (d.por_lancamento?.rows||[])
    .filter(r => /^(19|20)\d{2}(_|$)/i.test(r.product_tag||''));

  // Tipo de preço: converte booleano para label legível
  const precoRows = (d.por_preco?.rows||[]).map(r => ({
    ...r,
    preco_label: (r.is_discounted_sale===true||r.is_discounted_sale==='true') ? 'Com desconto (sale)' : 'Preço cheio',
  }));

  document.getElementById('subpanel-analise').innerHTML = `
    <div class="section-label" style="margin-bottom:4px">Análise · ${mesNome}</div>
    <div class="section-desc" style="margin-bottom:20px">Quebra de vendas por categoria, estado, cupom e lançamento</div>

    <div class="analise-grid">
      ${analiseCard('📦','Categorias',        d.por_categoria?.rows, 'product_type',    'net_sales')}
      ${analiseCard('📍','Estados (UF)',       d.por_estado?.rows,    'billing_region', 'net_sales')}
    </div>
    <div class="analise-grid">
      ${analiseCard('🎟️','Cupons',            d.por_cupom?.rows,     'discount_name',   'net_sales')}
      ${analiseCard('🚀','Lançamentos',        lancamentoRows,        'product_tag',  'net_sales')}
    </div>
    <div class="analise-grid" style="grid-template-columns:1fr">
      ${analiseCard('💰','Por Tipo de Preço',  precoRows,             'preco_label',     'net_sales')}
    </div>

    <div class="placeholder-card">
      <strong>Atacado · Arquitetos</strong>
      <span>Em breve — aguardando definição dos filtros no Shopify / integração com o TOTVS.</span>
    </div>`;
}
</script>
